<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="padding:0;position:relative;min-height:300px;background:var(--paper);">
  <div style="display:grid;grid-template-columns:7fr 5fr;gap:0;min-height:300px;">
    <div style="background:#87C2DD url('../assets/lookbook-latina-tracksuit-front.jpg') center/cover;"></div>
    <div style="padding:32px;display:flex;flex-direction:column;justify-content:center;background:var(--paper);">
      <div class="label" style="color:var(--magenta-500);margin-bottom:12px;">Drop 02 · Latina</div>
      <div style="font-family:var(--font-impact);font-size:54px;line-height:0.95;text-transform:uppercase;color:var(--ink-900);letter-spacing:-0.02em;">Para la cultura.</div>
      <div style="font-family:var(--font-script);font-style:italic;font-size:24px;color:var(--magenta-400);margin-top:8px;">Es una chimba.</div>
      <div style="font-family:var(--font-body);font-size:14px;line-height:1.5;color:var(--ink-700);margin-top:14px;max-width:280px;">All-over-print, hooded, hecho con orgullo. The Latina capsule is live now — 200 pieces.</div>
      <div style="margin-top:18px;">
        <button style="font-family:var(--font-body);font-weight:700;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;padding:14px 24px;background:var(--ink-900);color:#fff;border:none;cursor:pointer;">Shop the drop →</button>
      </div>
    </div>
  </div>
</div></body></html>
