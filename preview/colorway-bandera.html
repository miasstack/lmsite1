<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="padding:0;display:grid;grid-template-columns:140px 1fr;min-height:180px;">
  <div style="background-image:url('../assets/pattern-monogram-royal-blue.jpg');background-size:140px auto;"></div>
  <div style="padding:24px;background:var(--paper);">
    <div style="font-family:var(--font-impact);font-size:32px;line-height:1;text-transform:uppercase;letter-spacing:-0.01em;">Bandera</div>
    <div class="label" style="margin-top:4px;">Flag · varsity · machismo</div>
    <div style="display:flex;gap:8px;margin-top:18px;">
      <div style="flex:1;height:48px;background:#1A3B8E;color:#fff;display:flex;align-items:flex-end;padding:6px;font-family:ui-monospace,monospace;font-size:10px;">#1A3B8E</div>
      <div style="flex:1;height:48px;background:#DC2626;color:#fff;display:flex;align-items:flex-end;padding:6px;font-family:ui-monospace,monospace;font-size:10px;">#DC2626</div>
      <div style="flex:1;height:48px;background:#F5D000;color:var(--ink-900);display:flex;align-items:flex-end;padding:6px;font-family:ui-monospace,monospace;font-size:10px;">#F5D000</div>
    </div>
  </div>
</div></body></html>
