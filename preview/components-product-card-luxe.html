<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card dark" style="padding:32px;background:var(--ink-900);">
  <div class="label" style="margin-bottom:14px;color:rgba(255,255,255,0.55);">Product card · luxury LM</div>
  <div style="display:flex;gap:24px;align-items:flex-end;">
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;text-align:center;">
      <div style="width:100%;aspect-ratio:1/1.2;background:#0a0a0a;display:flex;align-items:center;justify-content:center;">
        <img src="../assets/logo-lm-monogram-male.png" style="width:55%;filter:drop-shadow(0 10px 30px rgba(233,30,151,0.35));">
      </div>
      <div style="font-family:var(--font-serif);font-style:italic;font-weight:700;font-size:22px;color:var(--cream);margin-top:18px;letter-spacing:-0.01em;">The Monogram Bomber</div>
      <div style="font-family:var(--font-body);font-size:11px;text-transform:uppercase;letter-spacing:0.18em;color:rgba(255,255,255,0.5);margin-top:6px;">Atelier · Edition 01</div>
      <div style="font-family:var(--font-serif);font-style:italic;font-weight:600;font-size:18px;color:var(--cream);margin-top:14px;">$ 1,250</div>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;text-align:center;">
      <div style="width:100%;aspect-ratio:1/1.2;background:#0a0a0a;display:flex;align-items:center;justify-content:center;">
        <img src="../assets/logo-lm-monogram-female.png" style="width:55%;filter:drop-shadow(0 10px 30px rgba(244,114,182,0.35));">
      </div>
      <div style="font-family:var(--font-serif);font-style:italic;font-weight:700;font-size:22px;color:var(--cream);margin-top:18px;letter-spacing:-0.01em;">The Atelier Bag</div>
      <div style="font-family:var(--font-body);font-size:11px;text-transform:uppercase;letter-spacing:0.18em;color:rgba(255,255,255,0.5);margin-top:6px;">Hecho a mano · 50 pieces</div>
      <div style="font-family:var(--font-serif);font-style:italic;font-weight:600;font-size:18px;color:var(--cream);margin-top:14px;">$ 2,800</div>
    </div>
  </div>
</div></body></html>
