<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="padding:24px;">
  <div class="label" style="margin-bottom:14px;">Ink neutrals · warm cream → true black</div>
  <div class="row">
    <div class="swatch" style="background:#050505"><span class="name">1000</span><span class="hex">#050505</span></div>
    <div class="swatch" style="background:#111111"><span class="name">900</span><span class="hex">#111111</span></div>
    <div class="swatch" style="background:#2B2B2B"><span class="name">700</span><span class="hex">#2B2B2B</span></div>

    <div class="swatch dark-fg" style="background:#F7F1E5"><span class="name">cream</span><span class="hex">#F7F1E5</span></div>
    <div class="swatch dark-fg" style="background:#FBF8F2;border:1px solid var(--line);"><span class="name">paper</span><span class="hex">#FBF8F2</span></div>
  </div>
