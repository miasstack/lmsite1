<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="padding:24px;">
  <div class="label" style="margin-bottom:14px;">Spacing scale · 4px base</div>
  <div style="display:flex;align-items:flex-end;gap:8px;">
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;"><div style="width:32px;height:4px;background:var(--magenta-500);"></div><span style="font-family:ui-monospace,monospace;font-size:9px;color:var(--fg-3);">4</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;"><div style="width:32px;height:8px;background:var(--magenta-500);"></div><span style="font-family:ui-monospace,monospace;font-size:9px;color:var(--fg-3);">8</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;"><div style="width:32px;height:12px;background:var(--magenta-500);"></div><span style="font-family:ui-monospace,monospace;font-size:9px;color:var(--fg-3);">12</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;"><div style="width:32px;height:16px;background:var(--magenta-500);"></div><span style="font-family:ui-monospace,monospace;font-size:9px;color:var(--fg-3);">16</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;"><div style="width:32px;height:24px;background:var(--magenta-500);"></div><span style="font-family:ui-monospace,monospace;font-size:9px;color:var(--fg-3);">24</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;"><div style="width:32px;height:32px;background:var(--magenta-500);"></div><span style="font-family:ui-monospace,monospace;font-size:9px;color:var(--fg-3);">32</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;"><div style="width:32px;height:48px;background:var(--magenta-500);"></div><span style="font-family:ui-monospace,monospace;font-size:9px;color:var(--fg-3);">48</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;"><div style="width:32px;height:64px;background:var(--magenta-500);"></div><span style="font-family:ui-monospace,monospace;font-size:9px;color:var(--fg-3);">64</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;"><div style="width:32px;height:96px;background:var(--magenta-500);"></div><span style="font-family:ui-monospace,monospace;font-size:9px;color:var(--fg-3);">96</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;"><div style="width:32px;height:128px;background:var(--magenta-500);"></div><span style="font-family:ui-monospace,monospace;font-size:9px;color:var(--fg-3);">128</span></div>
  </div>
</div></body></html>
