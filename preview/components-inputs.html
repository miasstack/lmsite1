<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="padding:24px;">
  <div class="label" style="margin-bottom:14px;">Inputs · square, hairline, magenta focus</div>
  <div style="display:flex;flex-direction:column;gap:12px;max-width:480px;">
    <div>
      <div style="font-family:var(--font-body);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--fg-3);margin-bottom:6px;">Email</div>
      <input value="mami@latinomagic.co" style="width:100%;box-sizing:border-box;font-family:var(--font-body);font-size:15px;padding:14px 16px;border:1.5px solid var(--ink-900);background:transparent;border-radius:0;color:var(--ink-900);outline:none;">
    </div>
    <div>
      <div style="font-family:var(--font-body);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--magenta-500);margin-bottom:6px;">Size · focused</div>
      <select style="width:100%;box-sizing:border-box;font-family:var(--font-body);font-size:15px;padding:13px 16px;border:2px solid var(--magenta-500);background:transparent;border-radius:0;color:var(--ink-900);outline:none;box-shadow:0 0 0 4px rgba(233,30,151,0.22);">
        <option>XS / 0–2</option>
        <option>S / 4–6</option>
        <option>M / 8–10</option>
      </select>
    </div>
  </div>
</div></body></html>
