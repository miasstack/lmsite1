<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="padding:24px;">
  <div class="label" style="margin-bottom:14px;">Elevation · flat by default · two depth tools</div>
  <div style="display:flex;gap:24px;align-items:center;">
    <div style="text-align:center;">
      <div style="width:120px;height:90px;background:var(--paper);border:1px solid var(--line);"></div>
      <div style="font-family:ui-monospace,monospace;font-size:10px;color:var(--fg-3);margin-top:8px;">flat</div>
    </div>
    <div style="text-align:center;">
      <div style="width:120px;height:90px;background:#fff;box-shadow:0 1px 0 rgba(17,17,17,0.04), 0 8px 24px -8px rgba(17,17,17,0.10);"></div>
      <div style="font-family:ui-monospace,monospace;font-size:10px;color:var(--fg-3);margin-top:8px;">card</div>
    </div>
    <div style="text-align:center;">
      <div style="width:120px;height:90px;background:#fff;box-shadow:0 1px 0 rgba(17,17,17,0.04), 0 18px 40px -10px rgba(17,17,17,0.18);"></div>
      <div style="font-family:ui-monospace,monospace;font-size:10px;color:var(--fg-3);margin-top:8px;">hover</div>
    </div>
    <div style="text-align:center;">
      <div style="width:120px;height:48px;background:#fff;border:2px solid var(--ink-900);box-shadow:4px 4px 0 0 var(--ink-900);display:flex;align-items:center;justify-content:center;font-family:var(--font-impact);text-transform:uppercase;font-size:18px;letter-spacing:0.02em;">DROP</div>
      <div style="font-family:ui-monospace,monospace;font-size:10px;color:var(--fg-3);margin-top:8px;">stamp · varsity</div>
    </div>
  </div>
</div></body></html>
