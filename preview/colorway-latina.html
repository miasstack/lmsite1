<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="padding:0;display:grid;grid-template-columns:140px 1fr;min-height:180px;">
  <div style="background:#87C2DD;display:flex;align-items:center;justify-content:center;position:relative;">
    <div style="width:100%;height:100%;background-image:url('../assets/pattern-monogram-baby-blue.jpg');background-size:140px auto;"></div>
  </div>
  <div style="padding:24px;background:var(--paper);">
    <div style="font-family:var(--font-impact);font-size:32px;line-height:1;text-transform:uppercase;letter-spacing:-0.01em;">Latina</div>
    <div class="label" style="margin-top:4px;">Feminine · perreo soft</div>
    <div style="display:flex;gap:8px;margin-top:18px;">
      <div style="flex:1;height:48px;background:#87C2DD;display:flex;align-items:flex-end;padding:6px;color:#fff;font-family:ui-monospace,monospace;font-size:10px;">#87C2DD</div>
      <div style="flex:1;height:48px;background:#F4C3D2;display:flex;align-items:flex-end;padding:6px;color:#7A1199;font-family:ui-monospace,monospace;font-size:10px;">#F4C3D2</div>
      <div style="flex:1;height:48px;background:#FFFFFF;border:1px solid var(--line);display:flex;align-items:flex-end;padding:6px;color:var(--ink-700);font-family:ui-monospace,monospace;font-size:10px;">#FFFFFF</div>
    </div>
  </div>
</div></body></html>
