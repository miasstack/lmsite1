<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="padding:0;display:grid;grid-template-columns:140px 1fr;min-height:180px;">
  <div style="background:#D9A741;display:flex;align-items:center;justify-content:center;">
    <div style="font-family:var(--font-display);font-size:18px;text-transform:uppercase;color:var(--ink-900);line-height:1;letter-spacing:0.04em;text-align:center;">LATINO<br>MAGIC</div>
  </div>
  <div style="padding:24px;background:var(--paper);">
    <div style="font-family:var(--font-impact);font-size:32px;line-height:1;text-transform:uppercase;letter-spacing:-0.01em;">Calle</div>
    <div class="label" style="margin-top:4px;">Street · ochre · classic</div>
    <div style="display:flex;gap:8px;margin-top:18px;">
      <div style="flex:1;height:48px;background:#D9A741;color:var(--ink-900);display:flex;align-items:flex-end;padding:6px;font-family:ui-monospace,monospace;font-size:10px;">#D9A741</div>
      <div style="flex:1;height:48px;background:#2B2B2B;color:#fff;display:flex;align-items:flex-end;padding:6px;font-family:ui-monospace,monospace;font-size:10px;">#2B2B2B</div>
      <div style="flex:1;height:48px;background:#FBF8F2;color:var(--ink-900);border:1px solid var(--line);display:flex;align-items:flex-end;padding:6px;font-family:ui-monospace,monospace;font-size:10px;">#FBF8F2</div>
    </div>
  </div>
</div></body></html>
