<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="padding:24px;background:var(--paper);">
  <div class="label" style="margin-bottom:14px;">Product card · streetwear</div>
  <div style="display:flex;gap:14px;">
    <!-- Card 1 -->
    <div style="flex:1;background:#fff;display:flex;flex-direction:column;border:1px solid var(--line);">
      <div style="aspect-ratio:1/1.1;background:#87C2DD url('../assets/lookbook-latina-tracksuit-front.jpg') center/cover;position:relative;">
        <span style="position:absolute;top:10px;left:10px;font-family:var(--font-body);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:0.1em;padding:4px 8px;background:var(--magenta-500);color:#fff;">New</span>
      </div>
      <div style="padding:12px;">
        <div style="font-family:var(--font-body);font-weight:800;font-size:14px;text-transform:uppercase;letter-spacing:-0.005em;line-height:1.2;">Latina Tracksuit</div>
        <div style="font-family:var(--font-body);font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--fg-3);margin-top:4px;">All-over-print · Hoodie + Jogger</div>
        <div style="font-family:var(--font-impact);font-size:22px;margin-top:8px;color:var(--ink-900);letter-spacing:0;">$185</div>
      </div>
    </div>
    <!-- Card 2 -->
    <div style="flex:1;background:#fff;display:flex;flex-direction:column;border:1px solid var(--line);">
      <div style="aspect-ratio:1/1.1;background:#181818 url('../assets/logo-bandidas-skull.png') center/70% no-repeat;position:relative;">
        <span style="position:absolute;top:10px;left:10px;font-family:var(--font-body);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:0.1em;padding:4px 8px;background:var(--cw-bandera-accent);color:#fff;">Drop 02</span>
      </div>
      <div style="padding:12px;">
        <div style="font-family:var(--font-body);font-weight:800;font-size:14px;text-transform:uppercase;line-height:1.2;">Bandidas Tee</div>
        <div style="font-family:var(--font-body);font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--fg-3);margin-top:4px;">Edición limitada · 200</div>
        <div style="font-family:var(--font-impact);font-size:22px;margin-top:8px;color:var(--ink-900);">$65</div>
      </div>
    </div>
    <!-- Card 3 -->
    <div style="flex:1;background:#fff;display:flex;flex-direction:column;border:1px solid var(--line);">
      <div style="aspect-ratio:1/1.1;background:#1FA85E url('../assets/product-bomber-green-monogram.png') center/cover;position:relative;">
        <span style="position:absolute;top:10px;left:10px;font-family:var(--font-body);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:0.1em;padding:4px 8px;background:var(--ink-900);color:var(--cream);">Selva</span>
      </div>
      <div style="padding:12px;">
        <div style="font-family:var(--font-body);font-weight:800;font-size:14px;text-transform:uppercase;line-height:1.2;">Monogram Bomber</div>
        <div style="font-family:var(--font-body);font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--fg-3);margin-top:4px;">Unisex · Selva colorway</div>
        <div style="font-family:var(--font-impact);font-size:22px;margin-top:8px;color:var(--ink-900);">$245</div>
      </div>
    </div>
  </div>
</div></body></html>
