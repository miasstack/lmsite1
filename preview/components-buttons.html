<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
button{cursor:pointer;font-family:var(--font-body);}
.btn-lm{font-family:var(--font-body);font-weight:700;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;padding:14px 24px;border:none;cursor:pointer;}
.btn-pill{background:linear-gradient(135deg,#9C1AAB 0%,#E91E97 55%,#F472B6 100%);color:#fff;border-radius:999px;padding:14px 32px;}
.btn-stamp{background:var(--ink-900);color:#fff;border:2px solid var(--ink-900);box-shadow:4px 4px 0 0 var(--magenta-500);border-radius:0;}
.btn-ghost{background:transparent;color:var(--ink-900);border:1.5px solid var(--ink-900);border-radius:0;}
.btn-impact{background:var(--ink-900);color:#fff;font-family:var(--font-impact);font-size:18px;letter-spacing:0.02em;padding:12px 28px;border-radius:0;border:none;}
</style></head>
<body><div class="card" style="padding:24px;">
  <div class="label" style="margin-bottom:14px;">Buttons</div>
  <div style="display:flex;flex-wrap:wrap;gap:14px;align-items:center;">
    <button class="btn-lm btn-pill">Shop the LM</button>
    <button class="btn-lm btn-stamp">Drop alert</button>
    <button class="btn-lm btn-ghost">View lookbook</button>
    <button class="btn-impact">ADD TO BAG</button>
  </div>
  <div style="display:flex;flex-wrap:wrap;gap:14px;align-items:center;margin-top:16px;">
    <button class="btn-lm btn-pill" style="background:var(--magenta-500);">Sold out</button>
    <button class="btn-lm" style="background:var(--magenta-100);color:var(--magenta-800);border-radius:999px;padding:14px 28px;">Notify me</button>
    <button class="btn-lm" style="background:transparent;color:var(--magenta-700);padding:14px 0;text-decoration:underline;text-underline-offset:4px;">Size guide →</button>
  </div>
</div></body></html>
