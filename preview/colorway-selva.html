<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="padding:0;display:grid;grid-template-columns:140px 1fr;min-height:180px;">
  <div style="background:#1FA85E;display:flex;align-items:center;justify-content:center;">
    <img src="../assets/product-bomber-green-monogram.png" style="width:140px;height:auto;object-fit:cover;">
  </div>
  <div style="padding:24px;background:var(--paper);">
    <div style="font-family:var(--font-impact);font-size:32px;line-height:1;text-transform:uppercase;letter-spacing:-0.01em;">Selva</div>
    <div class="label" style="margin-top:4px;">Tropical · sunlit · gold</div>
    <div style="display:flex;gap:8px;margin-top:18px;">
      <div style="flex:1;height:48px;background:#1FA85E;color:#fff;display:flex;align-items:flex-end;padding:6px;font-family:ui-monospace,monospace;font-size:10px;">#1FA85E</div>
      <div style="flex:1;height:48px;background:#FFD200;color:var(--ink-900);display:flex;align-items:flex-end;padding:6px;font-family:ui-monospace,monospace;font-size:10px;">#FFD200</div>
      <div style="flex:1;height:48px;background:#0B3D2E;color:#fff;display:flex;align-items:flex-end;padding:6px;font-family:ui-monospace,monospace;font-size:10px;">#0B3D2E</div>
    </div>
  </div>
</div></body></html>
