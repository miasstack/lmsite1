<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="padding:0;display:grid;grid-template-columns:140px 1fr;min-height:180px;">
  <div style="background:#181818;display:flex;align-items:center;justify-content:center;">
    <img src="../assets/logo-bandidas-skull.png" style="width:120px;height:auto;">
  </div>
  <div style="padding:24px;background:var(--paper);">
    <div style="font-family:var(--font-impact);font-size:32px;line-height:1;text-transform:uppercase;letter-spacing:-0.01em;">Bandidas</div>
    <div class="label" style="margin-top:4px;">Día de Muertos · capsule</div>
    <div style="display:flex;gap:8px;margin-top:18px;">
      <div style="flex:1;height:48px;background:#181818;color:#fff;display:flex;align-items:flex-end;padding:6px;font-family:ui-monospace,monospace;font-size:10px;">#181818</div>
      <div style="flex:1;height:48px;background:#BC1F2D;color:#fff;display:flex;align-items:flex-end;padding:6px;font-family:ui-monospace,monospace;font-size:10px;">#BC1F2D</div>
      <div style="flex:1;height:48px;background:#ECDFC6;color:var(--ink-900);display:flex;align-items:flex-end;padding:6px;font-family:ui-monospace,monospace;font-size:10px;">#ECDFC6</div>
    </div>
  </div>
</div></body></html>
